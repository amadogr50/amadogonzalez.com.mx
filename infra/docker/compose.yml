name: personal-website

services:
  postgres-payload:
    image: postgres:17
    container_name: personal-website-postgres-payload
    environment:
      POSTGRES_DB: amadogonzalez
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata-payload:/var/lib/postgresql/data

  postgres-umami:
    image: postgres:17
    container_name: personal-website-postgres-umami
    environment:
      POSTGRES_DB: umami
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pgdata-umami:/var/lib/postgresql/data

  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    container_name: personal-website-umami
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres-umami:5432/umami
      DATABASE_TYPE: postgresql
      APP_SECRET: umami-dev-secret-change-in-production
    ports:
      - "3001:3000"
    depends_on:
      - postgres-umami

volumes:
  pgdata-payload:
  pgdata-umami:
